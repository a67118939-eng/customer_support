spring.application.name=customer-support-faq-ai-agent
spring.profiles.default=local

server.port=8081
server.servlet.session.timeout=30m
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.same-site=strict
server.servlet.session.cookie.secure=${SESSION_COOKIE_SECURE:false}

# PostgreSQL Database
spring.datasource.url=jdbc:postgresql://127.0.0.1:5432/support_faq_db
spring.datasource.username=postgres
spring.datasource.password=${POSTGRES_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# Swagger / OpenAPI
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/api-docs

# AI Agent Settings
app.ai.default-mode=FAQ_ONLY
app.ai.auto-save-generated-faq=true
# Safe Real AI answers are activated so FAQ_ONLY can answer the same question later.
# Set this to false in stricter review workflows where every generated FAQ must be approved first.
app.ai.auto-approve-generated-faq=true
app.ai.generated-faq-default-category=AI Generated
app.ai.minimum-confidence-to-auto-save=0.50
# Regular users get this local cap; admins are unlimited. The external AI provider can still enforce quota/rate limits.
app.ai.token-limit-per-session=20000

# Dedicated admin account
# Only this configured account is kept as ADMIN. Registered users are always USER.
app.auth.admin.email=${ADMIN_EMAIL:admin@support.local}
app.auth.admin.full-name=${ADMIN_FULL_NAME:System Admin}
app.auth.admin.password=${ADMIN_PASSWORD:}

# WhatsApp Human Support
app.support.whatsapp-number=966554370544
app.support.whatsapp-message=Hello, I need help from customer support.

# OpenAI Settings
# IMPORTANT: Do not hardcode the real API key here.
# Set AI_PROVIDER=OPENAI to use OpenAI, or AI_PROVIDER=GEMINI to use Google AI Studio / Gemini.
app.ai.provider=${AI_PROVIDER:OPENAI}
# Add OPENAI_API_KEY in IntelliJ Environment Variables when AI_PROVIDER=OPENAI.
openai.api.key=${OPENAI_API_KEY:}
openai.chat.model=gpt-4o-mini
openai.transcription.model=gpt-4o-mini-transcribe
openai.tts.model=gpt-4o-mini-tts
openai.tts.voice=coral

# Google Gemini Settings
# Add GEMINI_API_KEY or GOOGLE_API_KEY in IntelliJ Environment Variables when AI_PROVIDER=GEMINI.
google.gemini.api-key=${GEMINI_API_KEY:${GOOGLE_API_KEY:}}
google.gemini.model=gemini-3.5-flash

# Admin / Security Key
# IMPORTANT: Do not hardcode the real admin key here.
# Add ADMIN_API_KEY in IntelliJ Environment Variables if your project uses it.
app.security.admin-api-key=${ADMIN_API_KEY:}
# Keep false for local demos if you do not set ADMIN_API_KEY.
# Set ADMIN_API_KEY_REQUIRED=true in production so admin APIs fail closed when the key is missing.
app.security.admin-api-key-required=${ADMIN_API_KEY_REQUIRED:false}
app.security.trust-proxy-headers=${TRUST_PROXY_HEADERS:false}
app.security.max-api-request-bytes=65536
app.security.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:8081,http://127.0.0.1:8081,http://localhost:8080,http://127.0.0.1:8080}

# Voice Upload Security
app.security.voice.max-upload-bytes=5242880

# Security Headers
app.security.headers.enabled=true

# Rate Limiting
app.security.rate-limit.chat-per-minute=20
app.security.rate-limit.ai-per-minute=5
app.security.rate-limit.voice-per-minute=3
app.security.rate-limit.tickets-per-hour=3
app.security.rate-limit.feedback-per-hour=10
app.security.rate-limit.admin-per-minute=60
app.security.rate-limit.api-per-minute=120
app.security.rate-limit.auth-per-minute=10

# Honeypot / Decoy Trap
# Keep false during development so you do not block yourself.
app.security.honeypot.auto-block-enabled=false
app.security.honeypot.block-duration-hours=24

# Production hardening checklist:
# - Set spring.jpa.show-sql=false.
# - Set spring.jpa.hibernate.ddl-auto=validate after migrations are managed.
# - Restrict CORS origins to the real frontend domain only.
# - Terminate HTTPS at the proxy/load balancer or enable server SSL.
# - Protect Security Center APIs with an ADMIN role when Spring Security login is added.
# - Protect actuator endpoints if actuator is added.
